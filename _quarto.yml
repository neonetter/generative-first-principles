project:
  type: book
  output-dir: _book

website:
  site-url: https://neonetter.github.io/generative-first-principles/
  site-path: /generative-first-principles/

book:
  title: "Generative Modeling from First Principles"
  subtitle: "ELBO, Adversarial Games, and Reverse Diffusion"
  author: "Course materials"
  date: today
  chapters:
    - index.qmd
    - generative_first_principles.ipynb

bibliography: references.bib

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    toc: true
    toc-depth: 3
    number-sections: true
    code-fold: true
    code-summary: "Show code"
    code-tools: true
    fig-dpi: 120
    smooth-scroll: true

execute:
  freeze: auto
  echo: true
  warning: false

editor: source
